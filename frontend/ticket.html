<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Details | Datastraw CRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased flex flex-col min-h-screen">
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <a href="index.html" class="text-sm font-medium text-slate-500 hover:text-slate-900 flex items-center gap-1 transition">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
                Back to Dashboard
            </a>
            <div id="header-status"></div>
        </div>
    </nav>

    <main class="flex-grow w-full max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8" id="ticketDetailContainer">
        
        <!-- Left Column: Details -->
        <div class="lg:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <div class="flex items-center gap-3 mb-4">
                    <h1 class="text-2xl font-bold text-slate-900" id="detail-subject">Loading...</h1>
                    <span id="detail-id" class="text-sm font-mono bg-slate-100 text-slate-600 px-2 py-1 rounded"></span>
                </div>
                
                <div class="flex flex-wrap gap-6 mb-8 text-sm text-slate-500 border-b border-slate-100 pb-6">
                    <div><span class="font-medium text-slate-700">Customer:</span> <span id="detail-name"></span></div>
                    <div><span class="font-medium text-slate-700">Email:</span> <span id="detail-email"></span></div>
                    <div><span class="font-medium text-slate-700">Opened:</span> <span id="detail-date"></span></div>
                </div>

                <div class="prose max-w-none mb-6">
                    <h3 class="text-sm font-semibold text-slate-900 mb-2 uppercase tracking-wide">Description</h3>
                    <p id="detail-desc" class="text-slate-700 whitespace-pre-wrap"></p>
                </div>

                <!-- AI Summary Box -->
                <div class="bg-indigo-50 border border-indigo-100 rounded-xl p-4">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-bold text-indigo-900 flex items-center gap-1">
                            <span>✨ AI Summary</span>
                        </h3>
                        <button id="btn-summarize" class="text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-lg hover:bg-indigo-700 transition shadow-sm font-medium">
                            Generate Summary
                        </button>
                    </div>
                    <p id="ai-summary-result" class="text-sm text-indigo-800 hidden"></p>
                </div>
            </div>

            <!-- Notes Timeline -->
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <h3 class="text-lg font-bold text-slate-900 mb-6">Activity & Notes</h3>
                <div id="notesList" class="space-y-4">
                    <!-- JS Injects Notes Here -->
                </div>
            </div>
        </div>

        <!-- Right Column: Update Actions -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 sticky top-24">
                <h3 class="text-lg font-bold text-slate-900 mb-4">Update Ticket</h3>
                <form id="updateTicketForm" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status</label>
                        <select id="update-status" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                            <option value="Open">Open</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Closed">Closed</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Add Note (Optional)</label>
                        <textarea id="update-note" rows="4" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="Type an internal note..."></textarea>
                    </div>

                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-2 px-4 rounded-lg transition-colors shadow-sm">
                        Save Changes
                    </button>
                </form>
            </div>
        </div>

    </main>

    <footer class="bg-white border-t border-slate-200 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-sm text-slate-500">
                Built for the <span class="font-semibold text-slate-700">Datastraw Engineering Assessment</span>.
            </p>
            <p class="text-sm text-slate-400">
                Developed by <a href="https://www.linkedin.com/in/maaz-shaikh-9b30902a5/" class="font-medium text-blue-600 hover:text-blue-800 transition">Maaz Shaikh</a>
            </p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
